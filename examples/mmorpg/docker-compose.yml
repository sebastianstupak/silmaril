version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: gameserver
      POSTGRES_PASSWORD: gamepass
      POSTGRES_DB: mmorpg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameserver"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgres://gameserver:gamepass@postgres:5432/mmorpg
      SERVER_PORT: 7777
      MAX_PLAYERS: 1000
      RUST_LOG: info
    ports:
      - "7777:7777"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
