# Industry Performance Thresholds
#
# Comprehensive benchmarking standards from Unity, Unreal Engine, Bevy, and AAA games.
# All data sourced from official documentation, community benchmarks, and industry research.
#
# Last Updated: 2026-02-01
# Sources: See individual entries below

version: 1
timestamp: "2026-02-01"

# ================================================
# FRAME TIME BUDGETS
# ================================================
frame_time:
  target_60fps:
    value: 16.67
    unit: "ms"
    source: "Unreal Engine / AAA Industry Standard"
    source_url: "https://dev.epicgames.com/documentation/en-us/unreal-engine/nanite-virtualized-geometry-in-unreal-engine"
    description: "Total frame budget for 60 FPS gameplay (1000ms / 60fps)"
    notes: "60-70% typically allocated to GPU for visually rich scenes"

  target_30fps:
    value: 33.33
    unit: "ms"
    source: "Unreal Engine / Console AAA Standard"
    description: "Total frame budget for 30 FPS (console games)"
    notes: "Common for AAA console titles, narrative games"

  target_120fps:
    value: 8.33
    unit: "ms"
    source: "Unreal Engine / High-end PC Standard"
    description: "Total frame budget for 120 FPS (competitive/VR)"
    notes: "Required for competitive FPS and VR applications"

  mobile_30fps:
    value: 22.0
    unit: "ms"
    source: "Unity Mobile Optimization Guide"
    description: "Mobile frame budget with 35% thermal headroom"
    notes: "Target 22ms for 30fps to prevent device thermal throttling"

# ================================================
# ECS PERFORMANCE
# ================================================
ecs:
  # Entity Iteration Throughput
  entity_iteration:
    bevy_v016:
      improvement: "3x faster than previous version"
      source: "Bevy Engine v0.16 (2024)"
      source_url: "https://bevyengine.org/"
      description: "Bevy v0.16 delivered 3x performance improvement, fastest Rust ECS"
      notes: "Considered fastest Rust ECS per ecs_bench_suite"

    unity_dots:
      value: 100000
      unit: "entities"
      time: 44.4
      time_unit: "ms"
      throughput: 2252
      throughput_unit: "entities/ms"
      source: "Unity DOTS/ECS 2024 Benchmark"
      source_url: "https://medium.com/superstringtheory/unity-dots-ecs-performance-amazing-5a62fece23d4"
      description: "100K boid entities with full ECS simulation (Ryzen 7 5800H + RTX 3060)"
      cpu_improvement: "5-50x over traditional Unity depending on parallelization"

    unreal_mass:
      capability: "Orders of magnitude more triangles and instances than traditional rendering"
      source: "Unreal Engine 5 Mass Entity System"
      source_url: "https://dev.epicgames.com/documentation/en-us/unreal-engine/mass-entity-in-unreal-engine"
      description: "Mass Entity used in Matrix Awakens demo for massive crowd simulations"
      notes: "Community reports 75K-100K+ entities feasible with proper optimization"

    silmaril_target:
      value: 10000000
      unit: "entities/sec"
      source: "silmaril Phase 1.1-1.2 target"
      description: "Target: 10M entities/sec query iteration"
      notes: "4.4x faster than Unity DOTS throughput target"

  # Rust ECS Benchmarks (from ecs_bench_suite)
  rust_ecs_benchmarks:
    legion_single_component:
      value: 1
      unit: "μs/iter"
      operation: "update"
      source: "ecs_bench_suite (archived)"
      source_url: "https://github.com/rust-gamedev/ecs_bench_suite"
      notes: "3x faster than specs for single component updates"

    hecs:
      build_time: 375
      update_time: 4
      unit: "μs/iter"
      source: "ecs_bench Position/Velocity test"
      description: "Lightweight ECS focusing on archetype-based storage"

    specs:
      build_time: 319
      update_time: 3
      unit: "μs/iter"
      source: "ecs_bench Position/Velocity test"
      description: "Mature ECS with flat performance across component counts"

  # Component Operations
  component_operations:
    silmaril_target:
      value: 1
      unit: "μs"
      source: "silmaril performance target"
      description: "Component add/remove operations target"

    rust_ecs_insert:
      value: "319-538"
      unit: "μs"
      entity_count: 10000
      component_count: 4
      source: "ecs_bench insert test"
      description: "Insert 10K entities with 4 components (Transform, Position, Rotation, Velocity)"

# ================================================
# SERIALIZATION PERFORMANCE
# ================================================
serialization:
  bincode:
    rust_benchmark:
      serialize: 2962
      deserialize: 285
      unit: "MB/s"
      source: "rust-serialization-benchmarks"
      source_url: "https://github.com/erickt/rust-serialization-benchmarks"
      description: "Fastest Rust serialization library for structured data"

    mesh_dataset:
      serialize_time: 2.88
      deserialize_time: 0.98
      unit: "ms"
      source: "djkoloski rust_serialization_benchmark"
      source_url: "https://github.com/djkoloski/rust_serialization_benchmark"
      description: "Mesh dataset with triangle arrays, vertices, normals"

    silmaril_target:
      value: 5
      unit: "ms"
      entity_count: 1000
      source: "silmaril Phase 1.3 target"
      description: "Serialize 1000 entities with multiple components"

    silmaril_actual:
      value: 0.0993
      unit: "ms"
      entity_count: 1000
      source: "silmaril Phase 1.3 benchmark (2026-02-01)"
      description: "✅ ACTUAL: 99.3µs (50x faster than target!)"
      throughput: 10000000
      throughput_unit: "entities/sec"

  flatbuffers:
    cap_n_proto_similar:
      marshal: 4039.83
      unmarshal_zerocopy: 1445.07
      unit: "MB/s"
      source: "buffer-benchmarks"
      source_url: "https://github.com/kcchu/buffer-benchmarks"
      description: "Cap'n Proto (similar to FlatBuffers) zero-copy performance"

    weakness:
      issue: "Major performance issues on highly-structured data"
      source: "djkoloski benchmark (minecraft_savedata test)"
      description: "FlatBuffers had worst serialization performance on structured data"
      notes: "Use for network protocols, not local save files"

  comparison:
    bincode_vs_flatbuffers:
      winner: "bincode"
      reason: "Bincode faster for typical game serialization (structured data)"
      flatbuffers_advantage: "Zero-copy deserialization for network messages"

# ================================================
# RENDERING PERFORMANCE
# ================================================
rendering:
  # Triangle Throughput
  triangles_per_frame:
    unity_dots:
      value: 31000000
      unit: "triangles/frame"
      source: "Unity DOTS 2024 Benchmark (RTX 3060)"
      source_url: "https://medium.com/superstringtheory/unity-dots-ecs-performance-amazing-5a62fece23d4"
      description: "31M triangles/frame with ECS renderer on RTX 3060"

    unreal_nanite:
      approach: "Pixel-scale detail, ~2x pixel count in triangles"
      source: "Unreal Engine 5 Nanite"
      source_url: "https://dev.epicgames.com/documentation/en-us/unreal-engine/nanite-virtualized-geometry-in-unreal-engine"
      description: "Ideally draw 2x pixels worth of triangles (hardware raster for >1px triangles)"
      compression: "14.4 bytes per input triangle average"
      notes: "1M triangle mesh = ~13.8 MB on disk"

    nanite_performance:
      benchmark: "8192 mesh instances"
      nanite_fps: 60
      traditional_lod_fps: 24
      source: "Medium Nanite Performance Article"
      source_url: "https://medium.com/@GroundZer0/nanite-optimizations-in-unreal-engine-5-diving-into-nanite-performance-a5e6cd19920c"
      description: "Nanite holds 60 FPS, traditional LODs drop to 24 FPS at extreme range"

  # Draw Calls
  draw_calls:
    traditional_limit:
      value: 1000
      unit: "draw calls/frame"
      source: "AAA Industry Standard (without GPU instancing)"
      description: "Traditional rendering pipeline limit"

    modern_instancing:
      value: 10000
      unit: "draw calls/frame"
      source: "Modern engines with GPU instancing"
      description: "With instancing and indirect draw calls"

  # LOD Management
  lod:
    unreal_nanite:
      automatic: true
      description: "Automatic LOD, no manual setup required"
      cluster_size: 128
      cluster_unit: "triangles"
      notes: "Clusters adjust based on screen size, distance, resolution"

# ================================================
# PHYSICS PERFORMANCE
# ================================================
physics:
  rigid_bodies:
    standard_target:
      value: 1000
      unit: "bodies"
      time: 16.67
      time_unit: "ms"
      source: "Physics engines (PhysX, Havok, Rapier)"
      description: "1000 active rigid bodies at 60 FPS"

    rapier_benchmark:
      falling_balls: 12500
      falling_cubes: 3380
      box_pyramid: 5050
      timestep: 16
      timestep_unit: "ms"
      velocity_iterations: 4
      position_iterations: 1
      source: "Rapier physics engine announcement (2020)"
      source_url: "https://dimforge.com/blog/2020/08/25/announcing-the-rapier-physics-engine/"
      description: "Rapier benchmarks: 12.5K balls, 3.4K cubes, 5K box pyramid"

    rapier_vs_nphysics:
      improvement: "4-8x faster than nphysics"
      multithreaded_improvement: "5-10x faster with multithreading"
      source: "Rapier announcement"
      notes: "PhysX and Rapier have close single-threaded performance"

  integration_simd:
    silmaril_target:
      value: 8
      unit: "bodies/iteration (AVX2)"
      source: "silmaril SIMD physics"
      description: "8-wide SIMD integration for position/velocity"

