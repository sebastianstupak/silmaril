name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Architecture validation (runs in parallel, referenced by architecture.yml)
  # This job ensures architecture.yml workflow is triggered
  architecture-check:
    name: Architecture Validation Status
    runs-on: ubuntu-latest
    steps:
      - name: Check architecture workflow
        run: |
          echo "ℹ️  Architecture validation runs in parallel via architecture.yml workflow"
          echo "   - Dependency checks (cargo-deny)"
          echo "   - Compile-time checks (build.rs)"
          echo "   - Runtime architecture tests"
          echo "   - Architecture-focused lints"
          echo ""
          echo "See https://github.com/${{ github.repository }}/actions/workflows/architecture.yml"

  # Format check
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Clippy lints (general checks)
  # Note: Architecture-specific lints run in architecture.yml
  clippy:
    name: Clippy (General)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Vulkan SDK
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-general
      - name: Run clippy (strict lints)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -W clippy::pedantic

  # Test matrix (all platforms)
  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-14]
        rust: [stable]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos-x64
          - os: macos-14
            platform: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      # Platform-specific Vulkan setup
      - name: Install Vulkan SDK (Linux)
        if: matrix.platform == 'linux'
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk libxcb1-dev libx11-dev

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe" -OutFile VulkanSDK.exe
          .\VulkanSDK.exe /S
          echo "VULKAN_SDK=C:\VulkanSDK" >> $env:GITHUB_ENV

      - name: Install MoltenVK (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install molten-vk

      # Cache dependencies
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}

      # Run tests
      - name: Run tests
        run: cargo test --workspace --all-features --verbose

      # Doc tests
      - name: Run doc tests
        run: cargo test --doc --workspace

  # Code coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Vulkan SDK
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --workspace --all-features --out Xml --timeout 300
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          fail_ci_if_error: true

  # Documentation build
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Vulkan SDK
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk
      - name: Build docs
        run: cargo doc --no-deps --workspace --all-features
      - name: Check for warnings
        run: cargo doc --no-deps --workspace --all-features 2>&1 | grep -i warning && exit 1 || exit 0

  # Security audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Quick benchmark smoke test (full benchmarks run in benchmark-ci.yml)
  benchmark-smoke:
    name: Benchmark Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Vulkan SDK
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-smoke
      - name: Run quick benchmark smoke test
        run: |
          # Run a subset of benchmarks quickly to ensure they compile and run
          cargo bench --package engine-core --bench ecs_simple -- --sample-size 10
        timeout-minutes: 10

  # CI complete gate
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs:
      - architecture-check
      - fmt
      - clippy
      - test
      - coverage
      - docs
      - audit
      - benchmark-smoke
    steps:
      - name: All CI checks passed
        run: |
          echo "✅ All CI checks passed!"
          echo ""
          echo "Completed checks:"
          echo "- Architecture validation (see architecture.yml)"
          echo "- Format check"
          echo "- Clippy lints"
          echo "- Cross-platform tests"
          echo "- Code coverage"
          echo "- Documentation build"
          echo "- Security audit"
          echo "- Benchmark smoke test"
          echo ""
          echo "ℹ️  Full benchmark suite runs separately in benchmark-ci.yml"
