name: Benchmark Regression

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Criterion benchmarks (wall-clock time, noisy but practical)
  criterion-benchmarks:
    name: Criterion Benchmarks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for baseline comparison

      # Install Rust
      - uses: dtolnay/rust-toolchain@stable

      # Platform-specific Vulkan setup
      - name: Install Vulkan SDK (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk libxcb1-dev libx11-dev

      - name: Install Vulkan SDK (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe" -OutFile VulkanSDK.exe
          .\VulkanSDK.exe /S
          echo "VULKAN_SDK=C:\VulkanSDK" >> $env:GITHUB_ENV

      - name: Install MoltenVK (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install molten-vk

      # Cache Rust dependencies
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-${{ matrix.os }}

      # Fetch baseline from main branch (if PR)
      - name: Fetch main branch baseline
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main:main
          git checkout main
          cargo bench --features profiling-puffin --no-fail-fast -- --save-baseline main || true
          git checkout -

      # Run benchmarks on current branch
      - name: Run benchmarks (current)
        run: |
          cargo bench --features profiling-puffin --no-fail-fast -- --save-baseline pr

      # Compare with baseline (PR only)
      - name: Compare with main baseline
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          cargo bench --features profiling-puffin --no-fail-fast -- --baseline main

      # Archive benchmark results
      - name: Archive criterion results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-results-${{ matrix.os }}
          path: target/criterion/
          retention-days: 30

  # NOTE: Iai-callgrind benchmarks removed due to compilation issues with cfg attributes
  # Criterion benchmarks provide sufficient regression detection for now
  # TODO: Re-add iai-callgrind in future once library matures or we find workaround

  # Optional: Bencher.dev integration for long-term tracking
  # Uncomment and configure when ready to use bencher.dev
  # bencher-tracking:
  #   name: Track Benchmarks with Bencher
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: dtolnay/rust-toolchain@stable
  #     - uses: Swatinem/rust-cache@v2
  #
  #     - name: Install Bencher CLI
  #       run: |
  #         curl -sSL https://bencher.dev/install.sh | sh
  #
  #     - name: Run benchmarks with Bencher
  #       env:
  #         BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
  #       run: |
  #         bencher run \
  #           --project silmaril \
  #           --adapter criterion \
  #           --testbed ${{ runner.os }} \
  #           --branch ${{ github.ref }} \
  #           "cargo bench --features profiling-puffin"

  # Summary job
  benchmark-complete:
    name: Benchmark Checks Complete
    runs-on: ubuntu-latest
    needs:
      - criterion-benchmarks
    steps:
      - name: All benchmark checks passed
        run: |
          echo "✅ All benchmark checks passed!"
          echo ""
          echo "Completed checks:"
          echo "- Criterion benchmarks (3 platforms)"
          echo ""
          echo "📊 View detailed results in the artifacts section above."
          echo ""
          echo "Note: Iai-callgrind benchmarks temporarily disabled due to"
          echo "      compilation issues. Criterion provides sufficient coverage."
