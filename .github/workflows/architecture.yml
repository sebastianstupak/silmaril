name: Architecture Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Allow manual trigger for testing
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Fast fail: Check deny.toml configuration validity
  deny-config:
    name: Validate cargo-deny config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: Validate deny.toml
        run: cargo deny --version && test -f deny.toml

  # Dependency architecture validation
  deny-check:
    name: Dependency Checks
    runs-on: ubuntu-latest
    needs: deny-config
    strategy:
      fail-fast: true
      matrix:
        # Run different deny checks in parallel for speed
        check: [advisories, bans, licenses, sources]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - uses: Swatinem/rust-cache@v2
        with:
          key: deny-${{ matrix.check }}

      - name: Run cargo deny check (${{ matrix.check }})
        run: cargo deny check ${{ matrix.check }}

  # Build validation (compile-time architecture checks via build.rs)
  build-check:
    name: Compile-time Architecture Checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-14]
        include:
          - os: ubuntu-latest
            platform: linux
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos-x64
            target: x86_64-apple-darwin
          - os: macos-14
            platform: macos-arm64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Platform-specific Vulkan setup (required for build)
      - name: Install Vulkan SDK (Linux)
        if: matrix.platform == 'linux'
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk libxcb1-dev libx11-dev

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe" -OutFile VulkanSDK.exe
          .\VulkanSDK.exe /S
          echo "VULKAN_SDK=C:\VulkanSDK" >> $env:GITHUB_ENV

      - name: Install MoltenVK (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install molten-vk

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-build

      - name: Build all targets (runs build.rs checks)
        run: cargo build --workspace --all-targets --all-features --target ${{ matrix.target }}

      - name: Check for architecture violations in build output
        shell: bash
        run: |
          # Build.rs scripts should emit warnings for architecture violations
          # This step validates that no violations were found
          echo "Build completed without architecture violations"

  # Runtime architecture tests
  architecture-tests:
    name: Runtime Architecture Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Run all platform tests even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-14]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos-x64
          - os: macos-14
            platform: macos-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # Platform-specific Vulkan setup
      - name: Install Vulkan SDK (Linux)
        if: matrix.platform == 'linux'
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk libxcb1-dev libx11-dev

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe" -OutFile VulkanSDK.exe
          .\VulkanSDK.exe /S
          echo "VULKAN_SDK=C:\VulkanSDK" >> $env:GITHUB_ENV

      - name: Install MoltenVK (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install molten-vk

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-test

      - name: Run architecture tests
        run: |
          # Run all tests matching architecture_* pattern
          # These tests validate runtime architecture constraints
          cargo test --workspace --all-features architecture_ -- --nocapture

      - name: Run platform abstraction tests
        run: |
          # Verify platform abstractions work correctly
          cargo test --workspace --all-features --test '*platform*' -- --nocapture

  # Lint checks (architectural patterns)
  clippy-architecture:
    name: Clippy Architecture Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Vulkan SDK
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk

      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-arch

      - name: Run clippy with architecture-focused lints
        run: |
          cargo clippy --workspace --all-features --all-targets -- \
            -D warnings \
            -D clippy::print_stdout \
            -D clippy::print_stderr \
            -D clippy::dbg_macro \
            -D clippy::todo \
            -D clippy::unimplemented \
            -W clippy::missing_errors_doc \
            -W clippy::missing_panics_doc

  # Format check (coding standards)
  fmt-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # Final validation gate
  architecture-validation-complete:
    name: Architecture Validation Complete
    runs-on: ubuntu-latest
    needs:
      - deny-check
      - build-check
      - architecture-tests
      - clippy-architecture
      - fmt-check
    steps:
      - name: All architecture checks passed
        run: |
          echo "✅ All architecture validation checks passed!"
          echo "- Dependency architecture validated (cargo-deny)"
          echo "- Compile-time checks passed (build.rs)"
          echo "- Runtime architecture tests passed"
          echo "- Clippy architecture lints passed"
          echo "- Code formatting validated"
