name: Benchmarks (Legacy)

# This workflow has been superseded by benchmark-ci.yml and benchmark-regression.yml
# Keeping this file for reference but redirecting to the new comprehensive workflows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  redirect-notice:
    name: Benchmark Workflow Redirect
    runs-on: ubuntu-latest
    steps:
      - name: Notify about new workflow
        run: |
          echo "ℹ️  This workflow has been replaced by more comprehensive benchmark workflows:"
          echo ""
          echo "📊 benchmark-ci.yml - Comprehensive benchmark suite across all platforms"
          echo "   - Runs on push, PRs, and weekly schedule"
          echo "   - Multi-platform benchmarks (Linux, Windows, macOS)"
          echo "   - Automated regression detection"
          echo "   - PR comments with results"
          echo ""
          echo "📈 benchmark-regression.yml - Detailed regression analysis"
          echo "   - Criterion benchmarks with baseline comparison"
          echo "   - Platform-specific optimizations"
          echo "   - Long-term baseline tracking"
          echo ""
          echo "🔗 View the new workflows at:"
          echo "   https://github.com/${{ github.repository }}/actions/workflows/benchmark-ci.yml"
          echo "   https://github.com/${{ github.repository }}/actions/workflows/benchmark-regression.yml"
