[package]
name = "engine-physics"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
rapier3d = "0.18"
engine-core = { path = "../core" }
engine-math = { path = "../math", features = ["serde", "simd"] }
serde = { version = "1.0", features = ["derive"] }
glam = "0.25"
rayon = "1.10"

[build-dependencies]
engine-build-utils = { path = "../build-utils" }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "integration_bench"
harness = false
