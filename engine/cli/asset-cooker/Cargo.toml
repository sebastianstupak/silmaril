[package]
name = "asset-cooker"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[[bin]]
name = "asset-cooker"
path = "src/main.rs"

[dependencies]
# Asset system
engine-assets = { path = "../../assets", features = ["async"] }
engine-core = { path = "../../core" }

# CLI parsing
clap = { version = "4.5", features = ["derive"] }

# Progress reporting
indicatif = "0.17"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
bincode = "1.3"

# Math
glam = "0.29"

# Hashing
blake3 = "1.5"

# Image processing
image = "0.25"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1.0"

# File operations
walkdir = "2.5"

[dev-dependencies]
tempfile = "3.12"

[features]
default = []
