[package]
name = "silmaril_server"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Server binary for Silmaril"

[[bin]]
name = "server"
path = "src/main.rs"

[dependencies]
# Core engine
engine-core = { path = "../../core" }
engine-networking = { path = "../../networking" }
engine-observability = { path = "../../observability", features = ["metrics"] }

# Macros
engine-macros = { path = "../../macros" }

# Math
glam = { version = "0.29", features = ["serde"] }

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
toml = "0.9"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Collections
hashbrown = "0.14"

[features]
default = ["server"]
server = []

# Optional features
metrics = []           # Enable Prometheus metrics
health_checks = []     # Enable health check endpoints

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.dev]
opt-level = 1  # Faster builds, still somewhat optimized
