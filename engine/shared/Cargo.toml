path = "tests/networking/server_loop_test.rs"
harness = true

[[test]]
name = "world_streaming_integration_test"
path = "tests/networking/world_streaming_integration_test.rs"
harness = true

[[test]]
name = "hot_reload_live_tests"
path = "tests/hot_reload_live_tests.rs"
harness = true
required-features = ["hot-reload"]

[[bench]]
name = "integration_bench"
path = "benches/integration_bench.rs"
harness = false

[[bench]]
name = "physics_integration_comparison"
path = "benches/physics_integration_comparison.rs"
harness = false

[[bench]]
name = "prediction_benches"
path = "benches/prediction_benches.rs"
harness = false

[[bench]]
name = "audio_ecs_bench"
path = "benches/audio_ecs_bench.rs"
harness = false

[[bench]]
name = "e2e_connectivity_bench"
path = "benches/e2e_connectivity_bench.rs"
harness = false

[features]
hot-reload = ["engine-assets/hot-reload"]

[dependencies]
engine-core = { path = "../core" }
engine-math = { path = "../math" }
engine-physics = { path = "../physics" }
engine-audio = { path = "../audio" }
engine-assets = { path = "../assets" }
engine-renderer = { path = "../renderer" }
engine-networking = { path = "../networking" }
engine-templating = { path = "../templating" }
glam = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
tracing = { workspace = true }
futures = "0.3"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = { workspace = true }
bincode = "1.3"
rand = { version = "0.8", features = ["small_rng"] }
tempfile = "3.8"
serde_yaml = "0.9"
rustc-hash = "1.1"
