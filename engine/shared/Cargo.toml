harness = true

[[test]]
name = "asset_rendering_integration"
path = "tests/asset_rendering_integration.rs"
harness = true

[[test]]
name = "e2e_simple_test"
path = "tests/e2e_simple_test.rs"
harness = true

[[test]]
name = "e2e_tests"
path = "tests/e2e_tests.rs"
harness = true

[[test]]
name = "template_ecs_integration"
path = "tests/template_ecs_integration.rs"
