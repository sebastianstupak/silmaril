[[test]]
name = "memory_leak_detection"
path = "tests/memory_leak_detection.rs"
harness = true

# Networking integration tests
[[test]]
name = "delta_integration_test"
path = "tests/networking/delta_integration_test.rs"
harness = true

[[test]]
name = "network_replication_test"
path = "tests/networking/network_replication_test.rs"
harness = true

[[test]]
name = "interest_management_test"
path = "tests/networking/interest_management_test.rs"
harness = true

[[test]]
name = "interest_integration_advanced_test"
path = "tests/networking/interest_integration_advanced_test.rs"
harness = true

[[test]]
name = "interest_edge_cases_test"
path = "tests/networking/interest_edge_cases_test.rs"
harness = true

[[test]]
name = "interest_mmo_scenarios_test"
path = "tests/networking/interest_mmo_scenarios_test.rs"
harness = true

[[test]]
name = "auth_encryption_integration_test"
path = "tests/networking/auth_encryption_integration_test.rs"
