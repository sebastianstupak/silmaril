[target.'cfg(all())']
rustflags = ["-D", "warnings"]  # Deny warnings in CI

[build]
jobs = 4  # Parallel compilation
target-dir = "../../target"

# =============================================================================
# Platform-Specific Build Tiers
# =============================================================================
# See: docs/CPU_FEATURES.md for tier descriptions and compatibility

# Tier 1: Baseline (x86-64 with SSE2) - 100% compatible
# Default x86_64 target - maximum compatibility
[target.x86_64-pc-windows-msvc]
# No additional flags - uses SSE2 baseline

[target.x86_64-unknown-linux-gnu]
# No additional flags - uses SSE2 baseline

[target.x86_64-apple-darwin]
# No additional flags - uses SSE2 baseline

# Tier 2: Modern (x86-64-v3: AVX2 + FMA + SSE4.2) - ~95% compatible
# Intel Haswell (2013+), AMD Excavator (2015+)
[target.x86_64-v3-pc-windows-msvc]
rustflags = ["-C", "target-cpu=x86-64-v3"]

[target.x86_64-v3-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v3"]

[target.x86_64-v3-apple-darwin]
rustflags = ["-C", "target-cpu=x86-64-v3"]

# Tier 3: High-end (x86-64-v4: AVX2 + AVX512) - ~70% compatible
# Intel Skylake-X (2017+), AMD Zen 4 (2022+)
[target.x86_64-v4-pc-windows-msvc]
rustflags = ["-C", "target-cpu=x86-64-v4"]

[target.x86_64-v4-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v4"]

[target.x86_64-v4-apple-darwin]
rustflags = ["-C", "target-cpu=x86-64-v4"]

# Development: Native CPU (maximum performance, not portable)
# Uncomment to enable for local development
# [build]
# rustflags = ["-C", "target-cpu=native"]

# =============================================================================
# Test Configuration
# =============================================================================

[test]
# Enable nextest features if available
# https://nexte.st/book/configuration.html

# Environment variables for tests
[env]
RUST_BACKTRACE = "1"
RUST_TEST_THREADS = "4"
# Increase stack size for Vulkan tests (16MB to handle validation layers)
RUST_MIN_STACK = "16777216"

# Profile for running tests
[profile.test]
# Enable debug info for better error messages
debug = true

# Optimize dependencies even in test mode for faster execution
opt-level = 1

# =============================================================================
# Benchmark Configuration
# =============================================================================

# Alias for running benchmarks and xtask
[alias]
xtask = "run --package xtask --"
bench-all = "bench --workspace"
bench-core = "bench -p engine-core"
bench-renderer = "bench -p engine-renderer"
bench-networking = "bench -p engine-networking"

# Coverage aliases
cov = "llvm-cov --html --open"
cov-all = "llvm-cov --all-features --workspace --html --open"
cov-lcov = "llvm-cov --all-features --workspace --lcov --output-path lcov.info"

# Test aliases for convenience
test-all = "test --workspace --all-features"
test-unit = "test --lib --all-features"
test-integration = "test --tests --all-features"
test-doc = "test --doc --all-features"
test-quick = "test --lib --no-fail-fast"

# =============================================================================
# Lints
# =============================================================================

[lints.rust]
unsafe_code = "forbid"  # No unsafe unless explicitly allowed
missing_docs = "warn"   # Warn on missing public API docs

[lints.clippy]
# Deny these
print_stdout = "deny"
print_stderr = "deny"
dbg_macro = "deny"
todo = "warn"
unwrap_used = "warn"
expect_used = "warn"

# Pedantic
pedantic = "warn"
nursery = "warn"

# Allow some pedantic lints
cast_precision_loss = "allow"
module_name_repetitions = "allow"

# Test-specific lints (allow in test code)
[lints.clippy.tests]
unwrap_used = "allow"
expect_used = "allow"
